<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quetzal Entregas 📦</title>
    <style>
        body { font-family: sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        h2 { color: #1a73e8; text-align: center; margin-bottom: 20px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #555; }
        input { width: 100%; padding: 12px; margin-top: 5px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; background-color: #25D366; color: white; border: none; padding: 15px; margin-top: 25px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>Quetzal 📦</h2>
        <label>👤 Nombre del Cliente:</label>
        <input type="text" id="nombre" placeholder="Ej. Juan Pérez">
        <label>📍 Dirección de Entrega:</label>
        <input type="text" id="direccion" placeholder="Ej. Calle 5, Zona 1">
        <label>💰 Precio ($):</label>
        <input type="number" id="precio" placeholder="0.00">
        <label>🛵 Envío ($):</label>
        <input type="number" id="envio" placeholder="0.00">
        <button onclick="enviarWhatsApp()">🚀 Enviar Pedido</button>
    </div>
    <script>
        function enviarWhatsApp() {
            const nombre = document.getElementById('nombre').value;
            const direccion = document.getElementById('direccion').value;
            const precio = document.getElementById('precio').value;
            const envio = document.getElementById('envio').value;
            const total = parseFloat(precio || 0) + parseFloat(envio || 0);
            const mensaje = *QUETZAL ENTREGAS*%0A%0A*Cliente:* ${nombre}%0A*Dirección:* ${direccion}%0A*Precio:* $${precio}%0A*Envío:* $${envio}%0A*TOTAL:* $${total.toFixed(2)};
            window.open(https://wa.me/?text=${mensaje}, '_blank');
        }
    </script>
</body>
</html>
